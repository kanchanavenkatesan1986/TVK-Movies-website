<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VIP Movies</title>

<link rel="stylesheet" href="./src/main.css"/>
<script src="./src/main.js"></script>

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;700&display=swap"/>
</head>

<body>

<div class="main">

    <!-- Overlay -->
    <div id="myNav" class="overlay">
        <img src="./m-image/Close icon.png" class="close" onclick="closeNav()">

        <img src="./m-image/VIP Movies.jpg" class="navimg">

        <a href="index.html">
            <img src="./m-image/N-Home.png" class="navb">
        </a>

        <a href="/sub-pages/feedback.html">
            <img src="./m-image/N-feedback.png" class="navb">
        </a>

        <a href="/sub-pages/about.html">
            <img src="./m-image/N-about.png" class="navb">
        </a>
    </div>

    <!-- Header -->
    <div class="header">
        <img src="./m-image/Menu icon.png" class="menu" onclick="openNav()">
        <img src="./m-image/Vip Title.png" class="title">
        <a href="search.html">
            <img src="./m-image/Search icon.png" class="search">
        </a>
    </div>

    <h1 class="heading">Tamil Years [ Collaction ]</h1>

    <div class="years">
        <h1 class="year" onclick="filterMovie('Tamil','2026')"><img class="y-icon" src="./m-image/Y icon.png"/>2026 Tamil Movies</h1>
        <h1 class="year" onclick="filterMovie('Tamil','2025')"><img class="y-icon" src="./m-image/Y icon.png"/>2025 Tamil Movies</h1>
        <h1 class="year" onclick="filterMovie('Tamil','2024')"><img class="y-icon" src="./m-image/Y icon.png"/>2024 Tamil Movies</h1>
    </div>

    <h1 class="heading">Hollywood Years [ Collaction ]</h1>

    <div class="years">
        <h1 class="year" onclick="filterMovie('Hollywood','2026')"><img class="y-icon" src="./m-image/Y icon.png"/>2026 Hollywood Movies</h1>
        <h1 class="year" onclick="filterMovie('Hollywood','2025')"><img class="y-icon" src="./m-image/Y icon.png"/>2025 Hollywood Movies</h1>
        <h1 class="year" onclick="filterMovie('Hollywood','2024')"><img class="y-icon" src="./m-image/Y icon.png"/>2024 Hollywood Movies</h1>

    </div>



</div>

</body>
<script>

function filterMovie(category,year){
location.href =
"list.html?category="+category+"&year="+year;
}

</script>
<style>
    .heading{
        font-size: var(--text-sub);
        color: var(--text);
        padding:20px 20px 0px 30px;
    }
    .years{
        width: 980px;
    }
    .year{
        position: relative;
        width: 940px;
        margin: 10px 20px;
        padding: 20px 0px 20px 20px;
        padding-left: 75px;
        font-size: var(--text-sub);
        font-family:'Lexend', sans-serif;
        text-align: left;
        border: none;
        border-radius: 10px;
        color: var(--sub-text);
        background-color: var(--card);
    }
    .y-icon{
        left: 20px;
        position: absolute;
        width: 40px;
    }
</style>
</html>
