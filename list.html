<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VIP Movies</title>

<link rel="stylesheet" href="./src/main.css"/>
<script src="./src/main.js"></script>

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;700&display=swap"/>
</head>

<body>

<div class="main">

    <!-- Overlay -->
    <div id="myNav" class="overlay">
        <img src="./m-image/Close icon.png" class="close" onclick="closeNav()">

        <img src="./m-image/VIP Movies.jpg" class="navimg">

        <a href="index.html">
            <img src="./m-image/N-Home.png" class="navb">
        </a>

        <a href="feedback.html">
            <img src="./m-image/N-feedback.png" class="navb">
        </a>

        <a href="about.html">
            <img src="./m-image/N-about.png" class="navb">
        </a>
    </div>

    <!-- Header -->
    <div class="header">
        <img src="./m-image/Menu icon.png" class="menu" onclick="openNav()">
        <img src="./m-image/Vip Title.png" class="title">
        <a href="search.html">
            <img src="./m-image/Search icon.png" class="search">
        </a>
    </div>

    <div id="movieList"></div>

    <div class="not-box">
        <h1 class="note">Guy's pls Waiting....<br>Coming Soon New Movies</h1>
    </div>
    



</div>

</body>
<style>
    .not-box{
        width: 980px;
        padding: 30px;
        text-align: center;
        align-items: center;
        justify-content: center;
        color: red;
    }
    .list{
        position: relative;
        width: 940px;
        margin: 20px 20px 0px 20px;
        height: 340px;
        background-color: var(--card);
        border-radius: 10px;
        display: flex;
    }
    .sub-list{
        width: 270px;
        height: 340px;
        padding: 10px;
    }
    .title-img{
        width: 250px;
        height: 320px;
        border-radius: 10px;
    }
    .data-list{
        width: 520px;
        height: 340px;
        padding: 20px;
    }
    .head{
        font-size: 40px;
        padding: 0px 0px 10px 0px;
        color: var(--text);
    }
    .release{
        font-size: 25px;
        padding: 10px;
        padding-left: 0px;
        color: var(--sub-text);
    }
    .language{
        font-size: 25px;
        padding: 10px;
        padding-left: 0px;
        color: var(--sub-text);
    }
    .year{
        position: absolute;
        right: 20px;
        top: 20px;
        text-align: center;
        padding: 5px 20px;
        font-size: 25px;
        border: solid 5px var(--main-theme);
        color: var(--main-theme);
        border-radius: 10px;
    }
    .ads{
        position: absolute;
        right: 20px;
        bottom: 20px;
        font-size: 30px;
        color: rgb(51, 255, 0);
    }
</style>
<script>

const params = new URLSearchParams(window.location.search);

const category = params.get("category");
const year = params.get("year");

fetch("data_json/movies.json")
.then(res => res.json())
.then(data => {

const filtered = data.filter(movie =>
(!category || movie.category == category) &&
(!year || movie.year == year)
);

const container = document.getElementById("movieList");

container.innerHTML = "";

filtered.forEach(movie => {

const card = document.createElement("a");

card.href = "watch.html?reward=" + movie.id;

card.innerHTML = `
<div class="list">
<div class="sub-list">
<img class="title-img" src="${movie.image}">
</div>

<div class="data-list">
<h1 class="head">${movie.title}</h1>
<h3 class="year">${movie.year}</h3>
<h2 class="release">Release : ${movie.release}</h2>
<h2 class="language">Language : ${movie.language}</h2>
<h3 class="ads">Watch Ads - Unlock ➜</h3>
</div>
</div>
`;

container.appendChild(card);

});

});

</script>

</html>
