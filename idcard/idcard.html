<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ID Card</title>
<link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

    <div id="card"></div>



</body>

<script>
    fetch("student.json")
.then(response => response.json())
.then(data => {

const container = document.getElementById("card");

data.students.forEach(student => {

const card = `

<div class="id-card">

    <div class="logo">
        <h3 class="course" id="coures">${student.course}</h3>
        <img id="img" src="${student.img}">
        <h5>Name : <span id="name">${student.name}</span></h5>
        <h5>Student ID : <span id="studentid">${student.studentid}</span></h5>
        <h5>Phone : <span id="phone">${student.phone}</span></h5>
        <h5>Batch : <span id="batch">${student.batch}</span></h5>

        <div class="bottom">
    <p class="desc">Authorized Student of LOGIN360 IT Institute</p>
    <p>Email : student@login360.in</p>
    <p>www.login360.in</p>
</div>

    </div>
    

</div>
`;

container.innerHTML += card;

});

});
</script>

<style>

    *{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#eee;
font-family:Arial;
}


#card{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:25px;
padding:25px;
justify-items:center;
}

@media(max-width:900px){

#card{
grid-template-columns:repeat(2,1fr);
}

}

@media(max-width:600px){

#card{
grid-template-columns:1fr;
padding:0px;
margin: 10px;
}

.id-card{
width:100%;
max-width:350px;
}

}


.id-card{
position:relative;
width:320px;
height:520px;
background-image:url("./idcard-templete.png");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
border-radius:20px;
box-shadow:0 10px 40px rgba(0,0,0,0.3);
overflow:hidden;

}

.logo{
position:relative;
width:100%;
height:100%;
}

.logo img{
width:100px;
height:150px;
position:absolute;
top:200px;
left:10px;
border:3px solid #ff7a00;
border-radius:7px;
object-fit:cover;
}

.course{
background:linear-gradient(to right,#ff7a00,#ff3c00);
color:white;
padding:5px 20px;
margin-left:77px;
margin-top:140px;
display:inline-block;
border-top-left-radius:10px;
border-bottom-left-radius:10px;
box-shadow:0 5px 10px rgba(0,0,0,0.2);

}

h5{
    position: relative;
    top: 65px;
margin-left:120px;
margin-top:10px;
font-size:14px;
color:black;
}

span{
color:#ff7a00;
}

.bottom{
position:absolute;
bottom:0;
width:100%;
background:linear-gradient(45deg,#1c4fa3,#ff7a00);
color:white;
text-align:center;
padding:10px 5px;
font-size:12px;
border-bottom-left-radius:20px;
border-bottom-right-radius:20px;

}

.desc{
font-size:11px;
opacity:0.9;
margin-bottom:4px;
}
.bottom p{
margin:2px 0;
}
</style>
</html>
