<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VIP Movies</title>

<link rel="stylesheet" href="./src/main.css"/>
<script src="./src/main.js"></script>

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;700&display=swap"/>

<style>

    #searchInput{
        margin: 20px 20px 0px 20px;
        width: 940px;
        height: 90px;
        background-color: var(--sub-black);
        border: none;
        font-size: 35px;
        padding: 20px;
        color: var(--text);
    }

.search-box{
width: 940px;    
margin:20px;
display:flex;
gap:20px;
}

.search-box input{
padding:20px;
font-size:25px;
background:var(--sub-black);
color:var(--text);
border:none;
border-radius: 10px;
}

.search-box select{
width:460px;    
padding:20px;
font-size:35px;
color: var(--sub-text);
background:var(--sub-black);
border:none;
border-radius: 10px;
}

    .list{
        position: relative;
        width: 940px;
        margin: 20px 20px 0px 20px;
        height: 340px;
        background-color: var(--card);
        border-radius: 10px;
        display: flex;
    }
    .sub-list{
        width: 270px;
        height: 340px;
        padding: 10px;
    }
    .title-img{
        width: 250px;
        height: 320px;
        border-radius: 10px;
    }
    .data-list{
        width: 520px;
        height: 340px;
        padding: 20px;
    }
    .head{
        font-size: 40px;
        padding: 0px 0px 10px 0px;
        color: var(--text);
    }
    .release{
        font-size: 25px;
        padding: 10px;
        padding-left: 0px;
        color: var(--sub-text);
    }
    .language{
        font-size: 25px;
        padding: 10px;
        padding-left: 0px;
        color: var(--sub-text);
    }
    .year{
        position: absolute;
        right: 20px;
        top: 20px;
        text-align: center;
        padding: 5px 20px;
        font-size: 25px;
        border: solid 5px var(--main-theme);
        color: var(--main-theme);
        border-radius: 10px;
    }
    .ads{
        position: absolute;
        right: 20px;
        bottom: 20px;
        font-size: 30px;
        color: rgb(51, 255, 0);
    }
    .not-box{
        width: 980px;
        padding: 30px;
        text-align: center;
        align-items: center;
        justify-content: center;
        color: red;
    }

</style>

</head>

<body>

<div class="main">


<!-- SEARCH -->


<input type="text" id="searchInput" placeholder="Search movie...">

<div class="search-box">

<select id="yearFilter">
<option value="">All Year</option>
<option value="2026">2026</option>
<option value="2025">2025</option>
<option value="2024">2024</option>
</select>

<select id="langFilter">
<option value="">All Language</option>
<option value="Tamil">Tamil</option>
<option value="Hollywood">Hollywood</option>
</select>

</div>


<div id="movieList"></div>

<div class="not-box">
        <h1 class="note">Movie Not Avalible...</h1>
    </div>

</div>


<script>

let allMovies=[]

fetch("movies.json")
.then(res=>res.json())
.then(data=>{

allMovies=data

displayMovies(allMovies)

})

function displayMovies(movies){

const container=document.getElementById("movieList")

container.innerHTML=""

movies.forEach(movie=>{

const card=document.createElement("a")

card.href="watch.html?reward="+movie.id

card.innerHTML=`

<div class="list">

<div class="sub-list">
<img class="title-img" src="${movie.image}">
</div>

<div class="data-list">

<h1 class="head">${movie.title}</h1>

<h3 class="year">${movie.year}</h3>

<h2 class="release">Release : ${movie.release}</h2>

<h2 class="language">Language : ${movie.language}</h2>

<h3 class="ads">Watch Ads - Unlock ➜</h3>

</div>

</div>

`

container.appendChild(card)

})

}


document.getElementById("searchInput").addEventListener("input",filterMovies)
document.getElementById("yearFilter").addEventListener("change",filterMovies)
document.getElementById("langFilter").addEventListener("change",filterMovies)


function filterMovies(){

const search=document.getElementById("searchInput").value.toLowerCase()
const year=document.getElementById("yearFilter").value
const lang=document.getElementById("langFilter").value.toLowerCase()

const filtered=allMovies.filter(movie=>

movie.title.toLowerCase().includes(search) &&

(year==="" || movie.year==year) &&

(lang==="" || movie.category.toLowerCase().includes(lang))

)

displayMovies(filtered)

}

</script>

</body>
</html>
