<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facebook Mini App</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial;
}
body{
    background:#18191a;
}

/* Layout */
#main{
    display:flex;
    gap:15px;
    padding:15px;
    min-height:100vh;
}

/* Panels */
.sub{
    flex:1;
    background:#242526;
    border-radius:12px;
    overflow-y:auto;
}

/* Mobile */
@media(max-width:768px){
    #main{
        flex-direction:column;
    }
}

/* Header */
.title{
    padding:15px;
    font-size:20px;
    color:#1877f2;
    border-bottom:1px solid #3a3b3c;
}

/* Form */
form{
    padding:15px;
}
input{
    width:90%;
    padding:10px;
    margin:8px 0;
    border-radius:8px;
    border:none;
}

/* Button */
button{
    padding:10px 20px;
    background:#1877f2;
    color:white;
    border:none;
    border-radius:8px;
}

/* Card */
.card{
    background:#3a3b3c;
    margin:15px;
    padding:15px;
    border-radius:12px;
    color:white;
}

/* Header */
.head{
    display:flex;
    gap:10px;
    align-items:center;
}
.head img{
    width:45px;
    border-radius:50%;
}

/* Image */
.post-img{
    width:100%;
    margin-top:10px;
    border-radius:10px;
}

/* Actions */
.actions{
    display:flex;
    justify-content:space-between;
    margin-top:10px;
}

.btn{
    cursor:pointer;
    padding:6px 10px;
    background:#242526;
    border-radius:6px;
}

.delete{
    color:red;
}
</style>
</head>

<body>

<div id="main">

<!-- LEFT -->
<div class="sub">
    <div class="title">Facebook Studio</div>

    <form id="form">
        <input type="file" id="img"><br>
        <input type="text" id="name" placeholder="Enter Name"><br>
        <input type="text" id="desc" placeholder="Enter Description"><br>

        <button type="button" onclick="addPost()">Add Post</button>
    </form>
</div>

<!-- RIGHT -->
<div class="sub">
    <div class="title">News Feed</div>
    <div id="feed"></div>
</div>

</div>

<script>

// ADD POST
function addPost(){

    var file = document.getElementById("img").files[0];
    var name = document.getElementById("name").value;
    var desc = document.getElementById("desc").value;

    if(file == undefined || name == "" || desc == ""){
        alert("Fill all fields");
        return;
    }

    var reader = new FileReader();

    reader.onload = function(e){

        var post = document.createElement("div");
        post.className = "card";

        post.innerHTML =
            "<div class='head'>" +
                "<img src='https://cdn-icons-png.flaticon.com/512/149/149071.png'>" +
                "<h4>" + name + "</h4>" +
            "</div>" +

            "<p style='margin-top:10px;'>" + desc + "</p>" +

            "<img class='post-img' src='" + e.target.result + "'>" +

            "<div class='actions'>" +
                "<div>" +
                    "<span class='btn' onclick='likePost(this)'>👍 <span>0</span></span>" +
                    "<span class='btn' onclick='dislikePost(this)'>👎 <span>0</span></span>" +
                "</div>" +
                "<span class='btn delete' onclick='deletePost(this)'>❌ Delete</span>" +
            "</div>";

        var feed = document.getElementById("feed");
        feed.insertBefore(post, feed.firstChild);

        document.getElementById("form").reset();
    }

    reader.readAsDataURL(file);
}


// LIKE
function likePost(btn){

    var span = btn.getElementsByTagName("span")[0];
    var count = parseInt(span.innerText);

    span.innerText = count + 1;
}


// DISLIKE
function dislikePost(btn){

    var span = btn.getElementsByTagName("span")[0];
    var count = parseInt(span.innerText);

    span.innerText = count + 1;
}


// DELETE (FIXED)
function deletePost(btn){

    var card = btn.closest(".card"); // ✅ best method
    card.remove();
}

</script>

</body>
</html>
