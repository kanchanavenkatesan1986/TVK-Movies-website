<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VIP Movies</title>

<link rel="stylesheet" href="./src/main.css"/>
<script src="./src/main.js"></script>

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;700&display=swap"/>
</head>

<body>

<div class="main">

    <!-- Overlay -->
    <div id="myNav" class="overlay" style="background-color: var(--sub-black);">
        <img src="./m-image/Close icon.png" class="close" onclick="closeNav()">

        <img src="./m-image/VIP Movies.jpg" class="navimg">

        <a href="index.html">
            <img src="./m-image/N-Home.png" class="navb">
        </a>

        <a href="#">
            <img src="./m-image/N-feedback.png" class="navb">
        </a>

        <a href="#">
            <img src="./m-image/N-about.png" class="navb">
        </a>
    </div>

    <!-- Header -->
    <div class="header">
        <img src="./m-image/Menu icon.png" class="menu" onclick="openNav()">
        <img src="./m-image/Vip Title.png" class="title">
        <a href="search.html">
            <img src="./m-image/Search icon.png" class="search">
        </a>
    </div>

    <div id="slider">

<div id="slidesContainer"></div>

<div id="dot"></div>

</div>


    <div class="info">
        <h1 class="info-head">Years Collaction</h1>
        <h1 class="info-all">View All</h1>
    </div>

    <div class="main-year">
        <div class="sub-year">
            <h1 class="year" onclick="filterMovie('Tamil','2026')">2026 Tamil movies</h1>
            <h1 class="year" onclick="filterMovie('Tamil','2025')">2025 Tamil movies</h1>
            <h1 class="year" onclick="filterMovie('Tamil','2024')">2024 Tamil movies</h1>
        </div>

        <div class="sub-year">
            <h1 class="year" onclick="filterMovie('Hollywood','2026')">2026 Hollywood movies</h1>
            <h1 class="year" onclick="filterMovie('Hollywood','2025')">2025 Hollywood movies</h1>
            <h1 class="year" onclick="filterMovie('Hollywood','2024')">2024 Hollywood movies</h1>
        </div>
    </div>
    <a href="/years.html"><h1 class="all-year">View Years ( Collaction ) ➜</h1></a>

    <div class="info">
        <h1 class="info-head">2025 Tamil Movies</h1>
        <h1 class="info-all" onclick="filterMovie('Tamil','2026')">View All</h1>
    </div>

    <div class="scroll" id="tamilMovies"></div>

    <div class="info">
        <h1 class="info-head">2025 Tamil Movies</h1>
        <h1 class="info-all" onclick="filterMovie('Hollywood','2026')">View All</h1>
    </div>

    <div class="scroll" id="hollywoodMovies"></div>



</div>

</body>
<style>
    .header{
        border: none;
    }

        /* SLIDER CONTAINER */
#slider{
  margin:0 auto;
  width:980px;
  height:452px;
  overflow:hidden;
  position:relative;
}

/* EACH SLIDE */
.slides{
  display:none;
  animation:fade 1s;
}

/* IMAGE SIZE */
.imggg{
  width:940px;
  height:420px;
  position:relative;
  left:20px;
  border-radius:10px;
  border:2px solid white;
  object-fit:cover;
}

/* DOT CONTAINER */
#dot{
  width:100%;
  text-align:center;
  position:absolute;
  bottom: -3px;
}

/* DOT STYLE */
.dot{
  display:inline-block;
  width:12px;
  height:12px;
  border-radius:50%;
  background:#d3d3d3;
  margin:0px 10px;
}

/* ACTIVE DOT */
.active{
  background:var(--main-theme);
}

/* FADE ANIMATION */
@keyframes fade{
  from{opacity:0.4;}
  to{opacity:1;}
}


    .main-year{
        width: 940px;
        margin: 0px 20px;
        display: flex;
        justify-content: space-between;
    }
    .sub-year{
        width: 465px;
    }
    .year{
        width: 100%;
        padding: 20px 20px;
        margin: 10px 0px;
        background-color: var(--card);
        color: var(--sub-text);
        border-radius: 10px;
    }
    .all-year{
        width: 940px;
        margin: 5px 20px;
        padding: 20px;
        background-color: var(--main-theme);
        color: var(--black);
        border-radius: 10px;
        text-align: center;
        font-size: var(--text-sub);
    }


    .info{
        width: 940px;
        justify-content: space-between;
        align-items: center;
        margin: 0px 20px;
        display: flex;
    }
    .info-head{
        font-size: 40px;
        color: var(--text);
    }
    .info-all{
        font-size: 40px;
        color: var(--main-theme);
    }


    /* scrolling container */
.scroll{
    position: relative;
    top: 0px;
    left: 10px;
    background-color:black;
    height: 450px;
    width: 960px;
    overflow-x: auto;
    overflow-y: hidden;
    white-space: nowrap;
}

/* hide scrollbar (optional) */
.scroll::-webkit-scrollbar{
    height:8px;
}

.scroll::-webkit-scrollbar-thumb{
    background:#444;
    border-radius:10px;
}


/* movie card */
#a{
    position: relative;
    width: 250px;
    height: 430px;
    top: 10px;
    border-radius: 10px;
    background-color: rgba(29, 28, 28, 1);
    margin-left: 5px;
    display: inline-block;
    overflow: hidden;
}

/* movie poster */
#ai{
    position: absolute;
    width: 230px;
    height: 360px;
    top: 10px;
    left: 10px;
    border-radius: 10px;
    object-fit: cover;
}

/* movie title */
#aitext{
    position: absolute;
    left: 15px;
    top: 380px;
    color: #FFF;
    font-family: Lexend;
    font-size: 26px;
    font-weight: 400;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    width: 220px;
}

/* view all image */
#va{
    position: absolute;
    width: 180px;
    left: 35px;
    top: 100px;
}
</style>

<script>

    let index = 0;

fetch("slider.json")
.then(res => res.json())
.then(data => {

const slidesContainer = document.getElementById("slidesContainer");
const dotContainer = document.getElementById("dot");

data.forEach((item,i)=>{

slidesContainer.innerHTML += `
<a href="${item.link}">
<div class="slides">
<img class="imggg" src="${item.image}">
</div>
</a>
`;

dotContainer.innerHTML += `<span class="dot"></span>`;

});

startSlider();

});

function startSlider(){

const slides = document.querySelectorAll(".slides");
const dots = document.querySelectorAll(".dot");

function changeSlide(){

if(index >= slides.length){
index = 0;
}

slides.forEach((slide,i)=>{
slide.style.display="none";
dots[i].classList.remove("active");
});

slides[index].style.display="block";
dots[index].classList.add("active");

index++;

setTimeout(changeSlide,2000);

}

changeSlide();

}


    function filterMovie(category,year){
location.href =
"list.html?category="+category+"&year="+year;
}

let allMovies = [];

fetch("movies.json")
.then(res => res.json())
.then(data => {
    allMovies = data;

    loadSection("Tamil","2025","tamilMovies");
    loadSection("Hollywood","2024","hollywoodMovies");
});


function loadSection(category, year, containerId){

const container = document.getElementById(containerId);
container.innerHTML="";

const movies = allMovies
.filter(m => m.category === category && m.year === year)
.slice(0,8);

movies.forEach(movie => {

const card = document.createElement("a");

card.href = "watch.html?reward=" + movie.id;

/* card box */
const box = document.createElement("div");
box.id="a";

/* movie image */
const img = document.createElement("img");
img.id="ai";
img.src = movie.image;

/* movie title */
const title = document.createElement("h1");
title.id="aitext";
title.innerText = movie.title + " [" + movie.year + "]";

/* append */
box.appendChild(img);
box.appendChild(title);
card.appendChild(box);

container.appendChild(card);

});


/* VIEW ALL CARD */

const viewCard = document.createElement("div");
viewCard.id = "a";
viewCard.style.background = "black";

/* check category */
if(category === "Tamil"){
    viewCard.setAttribute("onclick","filterMovie('Tamil','2025')");
}
else if(category === "Hollywood"){
    viewCard.setAttribute("onclick","filterMovie('Hollywood','2024')");
}

const viewImg = document.createElement("img");
viewImg.id = "va";
viewImg.src = "./m-image/View all.png";

viewCard.appendChild(viewImg);

container.appendChild(viewCard);

}



</script>
</html>
